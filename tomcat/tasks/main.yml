---
- name: Install Java OpenJDK 11
  dnf:
    name: java-11-amazon-corretto-devel
    state: present

- name: Add group "tomcat"
  group:
    name: tomcat
    state: present

- name: Add user "tomcat"
  user:
    name: tomcat
    group: tomcat
    home: /usr/share/tomcat
    create_home: no
    shell: /bin/false

- name: Download Tomcat
  get_url:
    url: "https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.85/bin/apache-tomcat-9.0.85.tar.gz"
    dest: /tmp/apache-tomcat.tar.gz
  # Note: Tomcat 7 is very old/end-of-life; consider 9 or 10 if possible.

- name: Create Tomcat Directory
  file:
    path: /opt/tomcat
    state: directory
    owner: tomcat
    group: tomcat

- name: Extract archive
  unarchive:
    src: /tmp/apache-tomcat.tar.gz
    dest: /opt/tomcat
    remote_src: yes
    extra_opts: [--strip-components=1]
    owner: tomcat
    group: tomcat

- name: Symlink install directory
  file:
    src: /opt/tomcat
    path: /usr/share/tomcat
    state: link

- name: Configure Tomcat server
  template:
    src: server.xml.j2
    dest: /usr/share/tomcat/conf/server.xml
    owner: tomcat
    group: tomcat
  notify: restart tomcat

- name: Create Systemd Unit File
  copy:
    dest: /etc/systemd/system/tomcat.service
    content: |
      [Unit]
      Description=Apache Tomcat Web Application Container
      After=network.target

      [Service]
      Type=forking
      User=tomcat
      Group=tomcat
      Environment="JAVA_HOME=/usr/lib/jvm/java-11-amazon-corretto"
      Environment="CATALINA_HOME=/usr/share/tomcat"
      ExecStart=/usr/share/tomcat/bin/startup.sh
      ExecStop=/usr/share/tomcat/bin/shutdown.sh

      [Install]
      WantedBy=multi-user.target

- name: Start and Enable Tomcat
  systemd:
    name: tomcat
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for tomcat to start
  wait_for:
    port: "{{ http_port | default(8080) }}"
