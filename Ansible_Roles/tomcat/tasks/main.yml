---
- name: Install Java OpenJDK 11 (Amazon Corretto)
  dnf:
    name: java-11-amazon-corretto-devel
    state: present

- name: Add group "tomcat"
  group:
    name: tomcat
    state: present

- name: Add user "tomcat"
  user:
    name: tomcat
    group: tomcat
    home: /usr/share/tomcat
    create_home: no
    shell: /bin/false

- name: Download Tomcat 9
  get_url:
    url: https://archive.apache.org/dist/tomcat/tomcat-9/v9.0.98/bin/apache-tomcat-9.0.98.tar.gz
    dest: /tmp/apache-tomcat-9.tar.gz

- name: Create Tomcat Directory
  file:
    path: /opt/apache-tomcat-9.0.98
    state: directory
    owner: tomcat
    group: tomcat

- name: Extract Tomcat archive
  unarchive:
    src: /tmp/apache-tomcat-9.tar.gz
    dest: /opt/
    remote_src: yes
    owner: tomcat
    group: tomcat

- name: Symlink install directory
  file:
    src: /opt/apache-tomcat-9.0.98
    path: /usr/share/tomcat
    state: link
    owner: tomcat
    group: tomcat

- name: Configure Tomcat server (Ports)
  template:
    src: server.xml.j2
    dest: /usr/share/tomcat/conf/server.xml
    owner: tomcat
    group: tomcat
  notify: restart tomcat

- name: Configure Tomcat users (Admin access)
  template:
    src: tomcat-users.xml.j2
    dest: /usr/share/tomcat/conf/tomcat-users.xml
    owner: tomcat
    group: tomcat
  notify: restart tomcat

- name: Install Systemd Unit File
  copy:
    dest: /etc/systemd/system/tomcat.service
    content: |
      [Unit]
      Description=Apache Tomcat 9 Web Application Container
      After=network.target

      [Service]
      Type=forking
      User=tomcat
      Group=tomcat
      Environment="JAVA_HOME=/usr/lib/jvm/java-11-amazon-corretto"
      Environment="CATALINA_PID=/usr/share/tomcat/temp/tomcat.pid"
      Environment="CATALINA_HOME=/usr/share/tomcat"
      Environment="CATALINA_BASE=/usr/share/tomcat"
      ExecStart=/usr/share/tomcat/bin/startup.sh
      ExecStop=/usr/share/tomcat/bin/shutdown.sh

      [Install]
      WantedBy=multi-user.target

- name: Start and Enable Tomcat service
  systemd:
    name: tomcat
    state: started
    enabled: yes
    daemon_reload: yes

- name: Wait for tomcat to start on port {{ http_port }}
  wait_for:
    port: "{{ http_port }}"
    delay: 5
    timeout: 60
